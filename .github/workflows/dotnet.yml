name: .NET

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true

    - name: Restore dependencies
      run: dotnet restore pfc.csproj

    - name: Build Release
      run: dotnet build pfc.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish pfc.csproj -c Release -o publish --no-build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pfc
        path: publish/
